name: backend-ci-cd-eks

on:
  push:
    branches: ["main"]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      EKS_NAMESPACE: tienda
      IMAGE_REPO: tienda-perritos-backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS (Learner Lab)
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [default]
          aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
          EOF

          cat > ~/.aws/config << EOF
          [default]
          region=${AWS_REGION}
          output=json
          EOF

      - name: Verificar identidad AWS
        run: aws sts get-caller-identity

      - name: Login a ECR
        run: |
          aws ecr get-login-password --region ${AWS_REGION} \
          | docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com

      - name: Build + Push imagen backend
        run: |
          TAG="v${GITHUB_RUN_NUMBER}"
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com/${IMAGE_REPO}:${TAG}"

          docker build -t ${IMAGE} ./backend
          docker push ${IMAGE}

          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Instalar kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Conectar a EKS
        run: |
          aws eks update-kubeconfig \
            --region ${AWS_REGION} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

          kubectl get nodes

      - name: Deploy a Kubernetes (rolling update)
        run: |
          kubectl -n ${EKS_NAMESPACE} set image deployment/tienda-backend \
          backend=${IMAGE}

          kubectl -n ${EKS_NAMESPACE} rollout status deployment/tienda-backend